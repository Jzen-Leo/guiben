    <title>归本文化</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #F5F7FA;
            color: #1E293B;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        :root {
            --brand: #E84C3D;
            --brand-rgb: 232, 76, 61;
            --card-bg: #FFFFFF;
            --border-light: #E2E8F0;
            --text-muted: #64748B;
            --text-dark: #0F172A;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.02);
        }

        /* 入场动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-title { animation: fadeInUp 1.2s ease forwards; }
        .animate-number { animation: fadeInUp 1.2s ease 0.3s forwards; opacity: 0; animation-fill-mode: forwards; }

        /* 导航栏 */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 5%;
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-logo { height: 40px; width: auto; object-fit: contain; }

        .nav-links { display: flex; gap: 2.8rem; }
        .nav-links a { text-decoration: none; color: #1E293B; font-weight: 500; font-size: 1rem; transition: color 0.15s; }
        .nav-links a:hover { color: var(--brand); }

        /* 通用区块 */
        .section { max-width: 1280px; margin: 0 auto; padding: 3rem 2rem 2.5rem 2rem; }

        /* 首页 */
        #home { padding-top: 2.5rem; }

        .company-name {
            font-size: 3.8rem;
            font-weight: 650;
            letter-spacing: -0.02em;
            line-height: 1.1;
            color: var(--text-dark);
            margin-bottom: 0.8rem;
            animation: fadeInUp 1.2s ease forwards;
        }

        .main-intro { font-size: 1.6rem; font-weight: 400; color: #334155; margin-bottom: 0.3rem; animation: fadeInUp 1.2s ease 0.15s forwards; opacity: 0; animation-fill-mode: forwards; }
        .sub-intro { font-size: 1.1rem; color: var(--text-muted); font-weight: 300; margin-bottom: 1.5rem; animation: fadeInUp 1.2s ease 0.25s forwards; opacity: 0; animation-fill-mode: forwards; }

        /* 数据条 */
        .stats-row { display: flex; flex-wrap: wrap; gap: 2rem; margin: 1.5rem 0 0.5rem 0; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border-light); }
        .stat-item { display: flex; align-items: baseline; gap: 0.6rem; }
        .stat-number { font-size: 2rem; font-weight: 600; color: var(--brand); line-height: 1; animation: fadeInUp 1.2s ease 0.4s forwards; opacity: 0; animation-fill-mode: forwards; }
        .stat-label { font-size: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        /* 公司详情 */
        .company-detail { margin: 0.13rem 0 6rem 0; font-size: 0.95rem; color: #334155; line-height: 1.6; background: transparent; padding: 0; }
        .company-detail strong { color: var(--brand); font-weight: 600; margin-right: 0.5rem; }

        /* 分类标题 */
        .category-header { display: flex; align-items: baseline; justify-content: space-between; margin: 2.2rem 0 1.2rem 0; border-bottom: 1px solid var(--border-light); padding-bottom: 0.4rem; }
        .category-title { font-size: 1.5rem; font-weight: 600; color: var(--text-dark); }
        .work-count { color: var(--brand); font-size: 0.95rem; background: rgba(var(--brand-rgb), 0.08); padding: 0.2rem 0.9rem; border-radius: 40px; border: 1px solid rgba(var(--brand-rgb), 0.2); }

        /* 视频网格 */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.8rem; }

        .video-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            transition: transform 0.2s ease, border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
        }

        .video-card:hover { transform: translateY(-4px); border-color: var(--brand); box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.1); }

        .cover-container { position: relative; width: 100%; aspect-ratio: 16 / 9; background-color: #F1F5F9; overflow: hidden; }
        .cover-img { width: 100%; height: 100%; object-fit: cover; display: block; }

        .play-button {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 44px; height: 44px;
            background-color: #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            pointer-events: none;
            transition: background-color 0.15s, transform 0.15s;
        }

        .play-button::after { content: ''; display: block; width: 0; height: 0; border-style: solid; border-width: 7px 0 7px 12px; border-color: transparent transparent transparent #1E293B; margin-left: 5px; }
        .video-card:hover .play-button { background-color: #F8FAFC; transform: translate(-50%, -50%) scale(1.05); }

        .card-info { padding: 0.6rem 1rem 0.8rem 1rem; }
        .card-title { font-weight: 550; font-size: 1rem; line-height: 1.4; color: var(--text-dark); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* 合作品牌 */
        .brand-section { max-width: 1280px; margin: 0 auto 1.5rem auto; padding: 1.5rem 2rem 2rem 2rem; border-top: 1px solid var(--border-light); border-bottom: 1px solid var(--border-light); }
        .brand-title { font-size: 1.5rem; font-weight: 600; color: var(--text-dark); margin-bottom: 1.2rem; }
        .brand-image { width: 100%; max-width: 100%; border-radius: 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); transition: transform 0.2s; display: block; }
        .brand-image:hover { transform: scale(1.005); }
        .brand-link { display: block; text-decoration: none; }

        /* 联系卡片 */
        #contact { background-color: #FFFFFF; border-top: 1px solid var(--border-light); padding: 3rem 2rem; }
        .contact-container { max-width: 1280px; margin: 0 auto; }
        .contact-title { font-size: 1.5rem; font-weight: 600; color: var(--text-dark); margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-light); padding-bottom: 0.6rem; }
        .contact-grid { display: flex; justify-content: flex-start; }
        .contact-item { background: #F8FAFC; border: 1px solid var(--border-light); border-radius: 20px; padding: 1.5rem 2rem; max-width: 500px; width: 100%; transition: border 0.2s; }
        .contact-item:hover { border-color: var(--brand); }
        .contact-row { display: flex; align-items: baseline; margin-bottom: 0.8rem; }
        .contact-row:last-child { margin-bottom: 0; }
        .contact-row strong { font-size: 0.85rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; width: 70px; flex-shrink: 0; }
        .contact-row span { font-size: 1rem; font-weight: 450; color: var(--text-dark); word-break: break-word; }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease;
            backdrop-filter: blur(8px);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-content { width: min(90vw, 1200px); background: #FFFFFF; border-radius: 20px; overflow: hidden; box-shadow: 0 30px 50px rgba(0,0,0,0.3); transform: scale(0.96); transition: transform 0.2s ease; border: 1px solid var(--border-light); }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 1.2rem; background: #FFFFFF; border-bottom: 1px solid var(--border-light); }
        .modal-title { font-size: 0.95rem; font-weight: 450; color: var(--text-dark); max-width: 80%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .close-btn { background: #F1F5F9; border: none; width: 30px; height: 30px; border-radius: 30px; font-size: 1.3rem; cursor: pointer; color: #334155; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-light); }
        .close-btn:hover { background: var(--brand); color: white; border-color: var(--brand); }
        .custom-video-player { width: 100%; aspect-ratio: 16 / 9; display: block; background: #0F172A; }
        .loading, .no-video { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 1rem; grid-column: 1/-1; border: 1px dashed var(--border-light); border-radius: 40px; }

        /* 移动端 */
        @media (max-width: 700px) {
            .navbar { padding: 0.8rem 5%; }
            .nav-links { gap: 1.2rem; }
            .nav-links a { font-size: 0.9rem; }
            .company-name { font-size: 2.8rem; }
            .main-intro { font-size: 1.3rem; }
            .stats-row { gap: 1.2rem; }
            .stat-number { font-size: 1.6rem; }
            .category-title { font-size: 1.3rem; }
            .section, .brand-section, #contact { padding-left: 1.2rem; padding-right: 1.2rem; }
            .contact-row strong { width: 60px; }
            .contact-row span { font-size: 0.95rem; }
            .brand-image { border-radius: 12px; }
        }
    </style>

        left: rect.left,
        top: rect.top,
        right: rect.right,
        bottom: rect.bottom,
        width: rect.width,
        height: rect.height,
        x: rect.x,
        y: rect.y
      },
      selector: selector,
      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-click",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 监听来自父窗口的消息
  function handleParentMessage(event) {
    console.log("Received message from parent:", event.data);
    if (event.data.type === "iframe-highlight-toggle") {
      var enabled = event.data.enabled;
      console.log("Highlight toggle:", enabled);
      if (enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "enable-iframe-highlight") {
      console.log("Enable iframe highlight");
      enableHighlight();
    } else if (event.data.type === "disable-iframe-highlight") {
      console.log("Disable iframe highlight");
      disableHighlight();
    } else if (event.data.type === "toggle-iframe-highlight") {
      var _enabled = event.data.enabled !== undefined ? event.data.enabled : !highlightEnabled;
      console.log("Toggle iframe highlight to:", _enabled);
      if (_enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "update-selected-element") {
      var selector = event.data.selector;
      console.log("Update selected element with selector:", selector);
      if (selector) {
        try {
          var element = document.querySelector(selector);
          console.log("Found element by selector:", element);
          updateSelectedHighlight(element);
        } catch (error) {
          console.warn("Failed to select element:", error);
          updateSelectedHighlight(null);
        }
      } else {
        updateSelectedHighlight(null);
      }
    } else if (event.data.type === "clear-selected-element") {
      console.log("Clear selected element");
      updateSelectedHighlight(null);
    }
  }

  // 启用高亮功能
  function enableHighlight() {
    console.log("Enabling highlight");
    document.addEventListener("mouseover", handleMouseOver, true);
    document.addEventListener("mouseout", handleMouseOut, true);
    document.addEventListener("click", handleClick, true);
    highlightEnabled = true;
    overlay.style.display = "block";
  }

  // 禁用高亮功能
  function disableHighlight() {
    console.log("Disabling highlight");
    highlightEnabled = false;
    // 保持事件监听器，但通过 highlightEnabled 变量控制行为
    // 这样可以保留选中状态的显示
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    // 不隐藏 selectedBox 和 selectedLabel，保留选中状态
  }

  // 完全禁用高亮功能（移除所有监听器）
  function fullyDisableHighlight() {
    console.log("Fully disabling highlight");
    highlightEnabled = false;
    document.removeEventListener("mouseover", handleMouseOver, true);
    document.removeEventListener("mouseout", handleMouseOut, true);
    document.removeEventListener("click", handleClick, true);
    overlay.style.display = "none";
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    selectedBox.style.display = "none";
    selectedLabel.style.display = "none";
  }

  // 添加事件监听
  enableHighlight();
  window.addEventListener("message", handleParentMessage);

  // 暴露全局函数供外部调用
  window.__iframeHighlightControl = {
    enable: enableHighlight,
    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
</body>
</html>
