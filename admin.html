<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 · 登录</title>
    <style>
        /* 样式基本不变，仅调整表头列宽 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            max-width: 1300px;  /* 增宽以适应多一列 */
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* 登录界面（略，与之前完全相同） */
        .login-container {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        .login-container h2 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #1d1c1f;
        }
        .password-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            outline: none;
        }
        .password-input:focus {
            border-color: #007aff;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
        }
        .login-btn {
            background: #007aff;
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            transition: 0.1s;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .login-btn:hover {
            background: #005bbf;
        }
        .error-message {
            color: #d70015;
            margin-top: 1rem;
            padding: 0.8rem;
            background: rgba(255,69,58,0.1);
            border-radius: 40px;
            border: 1px solid rgba(255,69,58,0.3);
        }

        .admin-form {
            display: none;
        }
        .admin-form h1 {
            font-weight: 600;
            font-size: 2.2rem;
            margin-bottom: 2rem;
            color: #1d1c1f;
        }
        .form-section {
            margin-bottom: 2.5rem;
            background: rgba(255,255,255,0.3);
            border-radius: 32px;
            padding: 1.8rem;
            border: 1px solid rgba(255,255,255,0.7);
        }
        .form-section h2 {
            font-weight: 500;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #1d1c1f;
        }
        .field {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #2c2c2e;
            font-size: 0.95rem;
        }
        input, textarea {
            width: 100%;
            padding: 0.9rem 1.2rem;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.8);
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            font-size: 1rem;
            outline: none;
            transition: 0.15s;
        }
        input:focus, textarea:focus {
            border-color: #007aff;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 0 0 4px rgba(0,122,255,0.1);
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }

        /* 视频列表表头 - 新增备选视频URL列 */
        .video-list-header {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr 1.5fr 1.5fr auto;  /* 封面URL, 作品名称, 主视频URL, 备选视频URL, 操作 */
            gap: 1rem;
            padding: 0.5rem 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1d1c1f;
            font-size: 0.9rem;
        }
        .video-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin: 1rem 0 1rem;
        }
        .video-item {
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.7);
            display: grid;
            grid-template-columns: 1.2fr 0.8fr 1.5fr 1.5fr auto;
            gap: 1rem;
            align-items: center;
        }
        .video-item input {
            background: rgba(255,255,255,0.6);
        }
        .delete-btn {
            background: rgba(255,69,58,0.2);
            border: 1px solid rgba(255,69,58,0.4);
            color: #d70015;
            width: 44px;
            height: 44px;
            border-radius: 30px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            backdrop-filter: blur(8px);
        }
        .delete-btn:hover {
            background: rgba(255,69,58,0.4);
        }
        .add-btn {
            background: rgba(0,122,255,0.15);
            border: 1px solid rgba(0,122,255,0.3);
            color: #007aff;
            padding: 0.8rem 2rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            backdrop-filter: blur(8px);
            margin-top: 0.5rem;
        }
        .add-btn:hover {
            background: rgba(0,122,255,0.25);
        }

        .contact-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .full-width {
            grid-column: span 2;
        }

        .action-bar {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
            flex-wrap: wrap;
        }
        .save-btn, .view-btn, .logout-btn {
            padding: 0.9rem 2.2rem;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: 0.1s;
            text-decoration: none;
            display: inline-block;
        }
        .save-btn {
            background: #007aff;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .save-btn:hover {
            background: #005bbf;
        }
        .view-btn {
            background: rgba(255,255,255,0.5);
            color: #1d1c1f;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .view-btn:hover {
            background: rgba(255,255,255,0.8);
        }
        .logout-btn {
            background: rgba(255,69,58,0.2);
            color: #d70015;
            border: 1px solid rgba(255,69,58,0.4);
        }
        .logout-btn:hover {
            background: rgba(255,69,58,0.3);
        }
        .message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 40px;
            background: rgba(0,0,0,0.05);
            color: #1d1c1f;
            text-align: center;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #007aff;
            text-decoration: none;
            font-weight: 500;
        }
        .change-password {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.5);
        }
        .change-password h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #1d1c1f;
        }
        .password-field {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .password-field input {
            flex: 1;
            min-width: 200px;
        }
        .update-password-btn {
            background: rgba(0,122,255,0.1);
            border: 1px solid rgba(0,122,255,0.3);
            color: #007aff;
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <!-- 登录界面（完全一致） -->
        <div id="loginContainer" class="login-container">
            <h2>🔐 管理员登录</h2>
            <input type="password" id="passwordInput" class="password-input" placeholder="输入密码" autofocus>
            <button class="login-btn" id="loginBtn">进入后台</button>
            <div id="loginError" class="error-message" style="display: none;">密码错误，请重试</div>
        </div>

        <!-- 管理表单 -->
        <div id="adminForm" class="admin-form">
            <a href="index.html" class="back-link" target="_blank">← 返回前台</a>
            <h1>⚙️ 后台配置</h1>

            <!-- 公司信息（不变） -->
            <div class="form-section">
                <h2>公司信息</h2>
                <div class="field">
                    <label>公司名称</label>
                    <input type="text" id="companyName" placeholder="例：Video Portfolio">
                </div>
                <div class="field">
                    <label>LOGO 图片URL (建议尺寸：150x40)</label>
                    <input type="url" id="logoUrl" placeholder="https://example.com/logo.png">
                </div>
                <div class="field">
                    <label>主简介（大号字体）</label>
                    <textarea id="mainIntro" placeholder="例如：A collection of my video projects" rows="2"></textarea>
                </div>
                <div class="field">
                    <label>副简介（小号字体）</label>
                    <textarea id="subIntro" placeholder="例如：showcasing creativity and storytelling." rows="2"></textarea>
                </div>
            </div>

            <!-- 视频作品列表（增加备选视频URL列） -->
            <div class="form-section">
                <h2>视频作品列表</h2>
                <div class="video-list-header">
                    <span>封面图片URL</span>
                    <span>作品名称</span>
                    <span>主视频URL (H.265)</span>
                    <span>备选视频URL (H.264)</span>
                    <span></span>
                </div>
                <div id="videoListContainer" class="video-list"></div>
                <button class="add-btn" id="addVideoBtn">➕ 添加新视频</button>
            </div>

            <!-- 联系方式（不变） -->
            <div class="form-section">
                <h2>联系方式</h2>
                <div class="contact-fields">
                    <div class="field">
                        <label>姓名</label>
                        <input type="text" id="contactName" placeholder="张三">
                    </div>
                    <div class="field">
                        <label>电话</label>
                        <input type="text" id="contactPhone" placeholder="+86 123 4567 8901">
                    </div>
                    <div class="field full-width">
                        <label>地址</label>
                        <input type="text" id="contactAddress" placeholder="北京市朝阳区某某创意园">
                    </div>
                </div>
            </div>

            <!-- 修改密码区域（不变） -->
            <div class="form-section change-password">
                <h3>修改管理员密码</h3>
                <div class="password-field">
                    <input type="password" id="newPassword" placeholder="新密码">
                    <button class="update-password-btn" id="updatePasswordBtn">更新密码</button>
                </div>
                <div style="margin-top: 0.8rem; font-size: 0.9rem; color: #666;">默认密码：admin123</div>
            </div>

            <div class="action-bar">
                <button class="save-btn" id="saveConfigBtn">保存配置</button>
                <a href="index.html" class="view-btn" target="_blank">预览前台</a>
                <button class="logout-btn" id="logoutBtn">退出登录</button>
            </div>
            <div id="messageBox" class="message"></div>
        </div>
    </div>

    <script>
        (function() {
            // 密码管理（保持不变）
            const STORAGE_PASSWORD_KEY = 'adminPassword';
            const DEFAULT_PASSWORD = 'admin123';
            if (!localStorage.getItem(STORAGE_PASSWORD_KEY)) {
                localStorage.setItem(STORAGE_PASSWORD_KEY, DEFAULT_PASSWORD);
            }
            function checkPassword(input) {
                return input === localStorage.getItem(STORAGE_PASSWORD_KEY);
            }
            function updatePassword(newPwd) {
                if (newPwd && newPwd.trim()) {
                    localStorage.setItem(STORAGE_PASSWORD_KEY, newPwd.trim());
                    return true;
                }
                return false;
            }

            const SESSION_LOGIN_KEY = 'adminLoggedIn';
            function setLoggedIn(status) {
                if (status) {
                    sessionStorage.setItem(SESSION_LOGIN_KEY, 'true');
                } else {
                    sessionStorage.removeItem(SESSION_LOGIN_KEY);
                }
            }
            function isLoggedIn() {
                return sessionStorage.getItem(SESSION_LOGIN_KEY) === 'true';
            }

            // 默认配置（包含video_url_alt字段）
            const DEFAULT_CONFIG = {
                companyName: 'Video Portfolio',
                logoUrl: 'https://via.placeholder.com/150x40/1e293b/ffffff?text=LOGO',
                mainIntro: 'A collection of my video projects',
                subIntro: 'showcasing creativity and storytelling.',
                videos: [
                    { cover_url: 'https://via.placeholder.com/320x180?text=封面1', title: '创意混剪', video_url: 'https://your-bucket.cos.ap-chengdu.myqcloud.com/video1_hevc.mp4', video_url_alt: 'https://your-bucket.cos.ap-chengdu.myqcloud.com/video1_h264.mp4' },
                    { cover_url: 'https://via.placeholder.com/320x180?text=封面2', title: '产品故事', video_url: 'https://your-bucket.cos.ap-chengdu.myqcloud.com/video2_hevc.mp4', video_url_alt: 'https://your-bucket.cos.ap-chengdu.myqcloud.com/video2_h264.mp4' },
                    { cover_url: 'https://via.placeholder.com/320x180?text=封面3', title: '品牌宣传片', video_url: 'https://your-bucket.cos.ap-chengdu.myqcloud.com/video3_hevc.mp4', video_url_alt: 'https://your-bucket.cos.ap-chengdu.myqcloud.com/video3_h264.mp4' }
                ],
                contact: {
                    name: '张三',
                    phone: '+86 123 4567 8901',
                    address: '北京市朝阳区某某创意园'
                }
            };

            function loadConfig() {
                const stored = localStorage.getItem('companyVideoConfig');
                if (stored) {
                    try {
                        const cfg = JSON.parse(stored);
                        if (!cfg.contact) cfg.contact = { name: '', phone: '', address: '' };
                        // 确保每个视频都有 video_url_alt 字段
                        if (cfg.videos) {
                            cfg.videos.forEach(v => {
                                if (v.video_url_alt === undefined) v.video_url_alt = '';
                            });
                        }
                        return cfg;
                    } catch (e) {
                        return DEFAULT_CONFIG;
                    }
                } else {
                    localStorage.setItem('companyVideoConfig', JSON.stringify(DEFAULT_CONFIG));
                    return DEFAULT_CONFIG;
                }
            }

            let config = loadConfig();

            // DOM 元素
            const loginContainer = document.getElementById('loginContainer');
            const adminForm = document.getElementById('adminForm');
            const passwordInput = document.getElementById('passwordInput');
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');

            const companyNameInput = document.getElementById('companyName');
            const logoInput = document.getElementById('logoUrl');
            const mainIntroInput = document.getElementById('mainIntro');
            const subIntroInput = document.getElementById('subIntro');
            const videoListDiv = document.getElementById('videoListContainer');
            const addBtn = document.getElementById('addVideoBtn');
            const saveBtn = document.getElementById('saveConfigBtn');
            const messageBox = document.getElementById('messageBox');
            const logoutBtn = document.getElementById('logoutBtn');
            const newPasswordInput = document.getElementById('newPassword');
            const updatePasswordBtn = document.getElementById('updatePasswordBtn');
            const contactNameInput = document.getElementById('contactName');
            const contactPhoneInput = document.getElementById('contactPhone');
            const contactAddressInput = document.getElementById('contactAddress');

            if (isLoggedIn()) {
                loginContainer.style.display = 'none';
                adminForm.style.display = 'block';
                initForm();
            } else {
                loginContainer.style.display = 'block';
                adminForm.style.display = 'none';
            }

            loginBtn.addEventListener('click', () => {
                const pwd = passwordInput.value;
                if (checkPassword(pwd)) {
                    setLoggedIn(true);
                    loginContainer.style.display = 'none';
                    adminForm.style.display = 'block';
                    initForm();
                    loginError.style.display = 'none';
                } else {
                    loginError.style.display = 'block';
                }
            });

            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    loginBtn.click();
                }
            });

            logoutBtn.addEventListener('click', () => {
                setLoggedIn(false);
                loginContainer.style.display = 'block';
                adminForm.style.display = 'none';
                passwordInput.value = '';
            });

            updatePasswordBtn.addEventListener('click', () => {
                const newPwd = newPasswordInput.value.trim();
                if (newPwd) {
                    updatePassword(newPwd);
                    showMessage('✅ 密码已更新', '#30b0c0');
                    newPasswordInput.value = '';
                } else {
                    showMessage('❌ 密码不能为空', '#ff9f0a');
                }
            });

            function initForm() {
                companyNameInput.value = config.companyName || '';
                logoInput.value = config.logoUrl || '';
                mainIntroInput.value = config.mainIntro || '';
                subIntroInput.value = config.subIntro || '';
                contactNameInput.value = config.contact.name || '';
                contactPhoneInput.value = config.contact.phone || '';
                contactAddressInput.value = config.contact.address || '';
                renderVideoList();
            }

            function renderVideoList() {
                const videos = config.videos || [];
                let html = '';
                videos.forEach((video, index) => {
                    html += `
                        <div class="video-item" data-index="${index}">
                            <input type="url" class="video-cover" placeholder="封面URL" value="${escapeHtml(video.cover_url || '')}">
                            <input type="text" class="video-title" placeholder="作品名称" value="${escapeHtml(video.title || '')}">
                            <input type="url" class="video-url" placeholder="主视频URL (H.265)" value="${escapeHtml(video.video_url || '')}">
                            <input type="url" class="video-url-alt" placeholder="备选视频URL (H.264)" value="${escapeHtml(video.video_url_alt || '')}">
                            <button class="delete-btn" data-index="${index}">✕</button>
                        </div>
                    `;
                });
                videoListDiv.innerHTML = html;

                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const index = e.target.dataset.index;
                        config.videos.splice(index, 1);
                        renderVideoList();
                        showMessage('视频已删除', '#ff9f0a');
                    });
                });
            }

            function escapeHtml(unsafe) {
                if (!unsafe) return '';
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            function collectFromForm() {
                config.companyName = companyNameInput.value.trim();
                config.logoUrl = logoInput.value.trim();
                config.mainIntro = mainIntroInput.value.trim();
                config.subIntro = subIntroInput.value.trim();

                config.contact = {
                    name: contactNameInput.value.trim(),
                    phone: contactPhoneInput.value.trim(),
                    address: contactAddressInput.value.trim()
                };

                const items = document.querySelectorAll('.video-item');
                const newVideos = [];
                items.forEach(item => {
                    const cover = item.querySelector('.video-cover')?.value.trim();
                    const title = item.querySelector('.video-title')?.value.trim();
                    const videoUrl = item.querySelector('.video-url')?.value.trim();
                    const videoUrlAlt = item.querySelector('.video-url-alt')?.value.trim();
                    if (title && videoUrl) { // 至少需要标题和主视频URL
                        newVideos.push({ cover_url: cover, title, video_url: videoUrl, video_url_alt: videoUrlAlt });
                    }
                });
                config.videos = newVideos;
            }

            function saveConfig() {
                collectFromForm();
                localStorage.setItem('companyVideoConfig', JSON.stringify(config));
                showMessage('✅ 配置已保存！', '#30b0c0');
            }

            function showMessage(text, bgColor = '#e9edf2') {
                messageBox.textContent = text;
                messageBox.style.background = bgColor;
                setTimeout(() => {
                    messageBox.textContent = '';
                    messageBox.style.background = 'rgba(0,0,0,0.05)';
                }, 3000);
            }

            function addNewVideo() {
                if (!config.videos) config.videos = [];
                config.videos.push({ cover_url: '', title: '', video_url: '', video_url_alt: '' });
                renderVideoList();
            }

            addBtn.addEventListener('click', addNewVideo);
            saveBtn.addEventListener('click', saveConfig);

            if (isLoggedIn() && !config) {
                config = loadConfig();
                initForm();
            }
        })();
    </script>
</body>
</html>
